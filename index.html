/* CARD */

.card{

border:1px solid rgba(255,255,255,0.1);
border-radius:15px;
padding:18px;
margin-bottom:15px;

}

/* BUTTON */

.btn{
display:block;
margin-top:15px;
padding:15px;

font-weight:bold;
text-decoration:none;
color:#000;
background:linear-gradient(45deg,#00eaff,#00ff88);

.btn:hover{

/* FEATURES */

.features li{

/* FOOTER */

/* BOTTOM CTA */

.bottom{
position:fixed;
bottom:0;
width:100%;
max-width:400px;
padding:10px;
background:#000;
}

.bottom a{
display:block;
padding:15px;
border-radius:40px;
text-align:center;
font-weight:bold;
background:linear-gradient(45deg,#ff00cc,#3333ff);
color:#fff;
text-decoration:none;
animation:pulse 1.5s infinite;
}

/* ANIMATIONS */

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}
